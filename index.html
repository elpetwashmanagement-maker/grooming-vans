<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f766e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Groomora" />
    <meta name="description" content="Groomora — Grooming Management" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/Groomora.jpg" />
    <link rel="icon" type="image/jpeg" href="/Groomora.jpg" />
    <title>Groomora</title>
    <!-- Google Maps Places API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBR-RQ639CWkt-SprO3EM4iHp89ahPVvmE&libraries=places" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('Groomora SW registered:', reg.scope);
              // Auto-actualizar cuando hay nueva versión
              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    newWorker.postMessage('skipWaiting');
                    window.location.reload();
                  }
                });
              });
            })
            .catch(err => console.log('SW error:', err));
          
          // Recargar cuando SW cambia
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            window.location.reload();
          });
        });
      }
    </script>
  </body>
</html>
